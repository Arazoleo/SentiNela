services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sentinela
      POSTGRES_USER: sentinela_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinela_dev_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinela_user -d sentinela"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://sentinela_user:${POSTGRES_PASSWORD:-sentinela_dev_pass}@postgres:5432/sentinela
      REDIS_URL: redis://redis:6379
      OLLAMA_ENDPOINT: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-medgemma:4b}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_troque_em_producao_64chars}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app   # hot reload em dev
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
